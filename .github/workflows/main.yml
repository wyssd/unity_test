name: Unity Multi-Branch Workflow

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  buildWebGL:
    name: Build WebGL
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-WebGL-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          targetPlatform: WebGL

      - name: Upload WebGL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL

  deployPage:
    name: Deploy to Pages
    needs: buildWebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WebGL Artifact
        uses: actions/download-artifact@v4
        with:
          name: WebGL-Build
          path: build-temp

      - name: Set Target Folder
        id: folder_logic
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "dest=prod" >> $GITHUB_OUTPUT
          else
            echo "dest=dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build-temp/WebGL
          target-folder: ${{ steps.folder_logic.outputs.dest }}
          branch: pages
          clean: false

  buildWindows:
    name: Build Windows EXE
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Library-Windows-

      - name: Build Windows
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          targetPlatform: StandaloneWindows64

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build-Exe
          path: build/StandaloneWindows64

  release:
    name: Create GitHub Release
    needs: buildWindows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout (wird für das Zippen benötigt)
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Build-Exe
          path: Windows-Build

      - name: Zip Build
        run: zip -r Windows-Release-${{ github.ref_name }}.zip Windows-Build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Windows-Release-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
