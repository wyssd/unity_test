name: WebGL Fast Build & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build WebGL 🛠️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Unity Library ⚡
        uses: actions/cache@v4
        with:
          path: unity_game/Library
          # Der Key sorgt dafür, dass der Cache nur erneuert wird, wenn sich die Unity-Version ändert
          key: Library-WebGL-${{ hashFiles('unity_game/ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-WebGL-

      - name: Unity Builder 🏗️
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity_game
          targetPlatform: WebGL

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL

  deploy:
    name: Deploy to Dev Folder 🚀
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: WebGL-Build
          path: build-temp

      - name: Deploy to GitHub Pages (dev folder)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build-temp/WebGL
          target-folder: dev # Erstellt den Ordner automatisch
          branch: gh-pages
          clean: false # WICHTIG: Verhindert, dass andere Ordner im Branch gelöscht werden

