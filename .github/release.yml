changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - github-actions[bot]
  categories:
    - title: "Features"
      labels:
        - feature
    - title: "Bugfixes"
      labels:
        - bug
    - title: "Documentation"
      labels:
        - documentation
    - title: "Maintenance & Refactoring"
      labels:
        - "*"
