image: alpine:latest

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - doc/**/*
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - doc/**/*
    - if: '$CI_COMMIT_TAG'
    - when: never

stages:
  - build
  - deploy

.default_doc_job: &default_doc_job
  before_script:
    - apk add --no-cache typst fontconfig ttf-freefont git
    - mkdir -p /usr/share/fonts/truetype/msttcorefonts
    - cp doc/.fonts/* /usr/share/fonts/truetype/msttcorefonts/
    - fc-cache -fv

.build_rules: &build_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

.deploy_rules: &deploy_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'



main_pdf_build:
  <<: *default_doc_job
  stage: build
  script:
    - mkdir -p doc/output
    - git fetch --tags --force
    - VERSION="$(git tag --list --sort=-v:refname | grep -E '^v?[0-9]{1,2}\.[0-9]{1,2}$' | head -n 1 || true)"
    - if [ -n "$CI_COMMIT_TAG" ] && echo "$CI_COMMIT_TAG" | grep -Eq '^v?[0-9]{1,2}\.[0-9]{1,2}$'; then VERSION="$CI_COMMIT_TAG"; fi
    - VERSION="${VERSION#v}"
    - if [ -z "$VERSION" ]; then VERSION="00.00"; fi
    - GIT_VERSION="${CI_COMMIT_SHORT_SHA}"
    - SAFE_VERSION="$(printf '%s' "$VERSION" | sed 's/[&|]/\\&/g')"
    - SAFE_GIT_VERSION="$(printf '%s' "$GIT_VERSION" | sed 's/[&|]/\\&/g')"
    - sed -e "s|__VERSION__|$SAFE_VERSION|g" -e "s|__GIT_VERSION__|$SAFE_GIT_VERSION|g" doc/main.typ > doc/main.ci.typ
    - typst compile --root doc --font-path /usr/share/fonts/truetype/msttcorefonts doc/main.ci.typ doc/output/documentation.pdf
  artifacts:
    paths:
      - doc/output/documentation.pdf
    expire_in: 7 days
  <<: *build_rules

pages:
  <<: *default_doc_job
  stage: deploy
  needs:
    - job: main_pdf_build
      artifacts: true
    - job: protocols_pdf_build
      artifacts: true
  script:
    - rm -rf public
    - mkdir -p public
    - cp doc/output/documentation.pdf public/
    - cp doc/output/protokolle.pdf public/
  artifacts:
    paths:
      - public/documentation.pdf
      - public/protokolle.pdf
  <<: *deploy_rules
